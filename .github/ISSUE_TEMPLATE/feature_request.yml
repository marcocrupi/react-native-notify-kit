name: Feature Request
description: Propose a new feature or enhancement
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Before you submit

        - For **"how do I..."** questions, please use [Discussions Q&A](https://github.com/marcocrupi/react-native-notify-kit/discussions/categories/q-a) instead.
        - This fork preserves the original Notifee API surface. Significant API additions are unlikely to be merged unless they solve a clear gap.
        - The native core (`NotifeeCore`) is not modified in this fork — only the React Native bridge layer. Features requiring native core changes may not be feasible.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would the API look? Provide a code example if possible.
      placeholder: |
        ```ts
        await notifee.newMethod({ ... });
        ```
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
        - Both
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches have you considered?

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, screenshots, or references.
